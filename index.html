<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SynkAI — Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23007BFF'/><text x='50' y='75' font-family='Arial' font-size='70' font-weight='bold' fill='white' text-anchor='middle'>F</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo-area">
        <img src="Logo.png" alt="SynkAI" class="logo-image" />
        <p class="logo-subtitle">Central de Atendimento Inteligente</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">E-mail</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            </span>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-password" onclick="togglePassword()" id="toggleBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" />
            <span class="checkmark"></span>
            Lembrar acesso
          </label>
          <a href="#" class="forgot-link">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          <span class="btn-text">Entrar</span>
          <span class="btn-loader" style="display:none">
            <svg class="spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="30 70"/></svg>
          </span>
        </button>

        <div class="error-message" id="errorMsg" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="errorText">Credenciais inválidas.</span>
        </div>
      </form>

      <p class="login-footer">© 2026 SynkAI · Todos os direitos reservados</p>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnLoader = btn.querySelector('.btn-loader');
      const errorMsg = document.getElementById('errorMsg');

      btnText.style.display = 'none';
      btnLoader.style.display = 'flex';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Store token and user info
          localStorage.setItem('wp_crm_token', data.token);
          localStorage.setItem('wp_crm_user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          throw new Error(data.error || 'Credenciais invlidas');
        }
      } catch (err) {
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
        btn.disabled = false;
        errorMsg.style.display = 'flex';
        document.getElementById('errorText').textContent = err.message;
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
    }
  </script>
</body>
</html>
