<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WPCRM - Entregador</title>
  <meta name="description" content="Aplicativo do Entregador - WPCRM">

  <!-- PWA: Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00a884">

  <!-- PWA: iOS/Safari support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Entregador">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">

  <!-- PWA: Android/Chrome extras -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Entregador">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/entregador.css" />
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div id="loginScreen" class="screen">
    <div class="login-container">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="#00a884">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5zm5 4h-2v-2h2v2zm0-4h-2V7h2v5z"/>
        </svg>
      </div>
      <h2>Login Entregador</h2>
      <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="Seu e-mail">
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="Sua senha">
      </div>
      <button onclick="login()">Entrar</button>
      <div id="loginError" class="error-msg"></div>
    </div>
  </div>

  <!-- TELA DE DASHBOARD (LISTA) -->
  <div id="dashboardScreen" class="screen" style="display:none;">
    <header class="app-header">
      <div class="title">Entregas Disponíveis</div>
      <button onclick="logout()" class="btn-logout">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </header>
    <main class="content-scroll" id="listaEntregas">
      <!-- Cards renderizados via JS -->
      <div style="text-align:center; padding: 20px; color: var(--text-muted);">Carregando entregas...</div>
    </main>
  </div>

  <!-- TELA DE DETALHES -->
  <div id="detailsScreen" class="screen" style="display:none;">
    <header class="app-header">
      <button onclick="voltarParaDashboard()" class="btn-back">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div class="title">Detalhes da Entrega</div>
    </header>
    <main class="content-scroll">
      <div class="details-card" id="detailsContent">
        <!-- Renderizado via JS -->
      </div>
      <div class="action-buttons">
        <button class="btn-secondary" onclick="voltarParaDashboard()">Voltar</button>
        <button class="btn-primary" onclick="aceitarEntrega()">Aceitar</button>
      </div>
    </main>
  </div>

  <script src="js/entregador.js"></script>
</body>
</html>
